<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 005</title>
</head>
<body>
    <form>
        <input type="text" placeholder="Digite seu nome de usúario:"><br>
        <input type="password" placeholder="Digite sua senha:"><br>
        <input type="email" placeholder="Digite seu email:"><br>
        <input type="number" placeholder="Digite sua idade:"><br>
        <input type="date" placeholder="Digite uma data:"><br>
        <hr>
        <input type="color" name="red" id="red"><br>
        <input type="file" name="gato" id="gato"><br>
        <input type="time" name="time" id="time"><br>
        <input type="week" name="week" id="week"><br>
        <input type="search" name="search" id="search"><br>
        <input type="radio" name="radio" id="radio"><br>
        <input type="checkbox" name="checkbox" id="checkbox"><br>
        <input type="tel" name="tel" id="tel"><br>
        <input type="range" name="range" id="range"><br>
        <input type="datetime-local" name="datetime-local" id="datetime-local">
    </form>
</body>
</html>
