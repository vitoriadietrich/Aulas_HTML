<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 007</title>
</head>
<body>
    <h1>Crie sua Conta Globo, é grátis</h1>
    <p>Uma conta única e gratuita para todos ps produtos Globo.</p>
    <p><u>Entenda como a Conta Globo funciona.</u></p>

    <form>
         <label for="name">Nome completo</label><br>
         <input type="text" name="name" id="name" placeholder="Informe seu nome completo"><br><br>

         <label for="email">Informe seu email</label><br>
         <input id="email" type="email" placeholder="Ex: @gmail, @outlook, @yahoo, etc." required><br><br>

         <label for="date">Data de nascimento</label><br>
         <input type="text" name="text" id="text" placeholder="dd/mm/aaaa"><br><br>

         <input type="submit" value="Próximo">
    </form>
</body>
</html>
